services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["./data/pg:/var/lib/postgresql/data"]

  jupyter:
    build:
      context: ./docker
      dockerfile: Dockerfile.jupyter
    ports: ["8888:8888"]
    volumes:
      - ./:/workspace              # notebooks + code
      - duckdb-data:/data          # mount shared DuckDB database volume
    working_dir: /workspace
    command: jupyter lab --ip=0.0.0.0 --no-browser --allow-root --NotebookApp.token=''
    profiles: ["dev"]

  spark-master:
    build:
      context: .
      dockerfile: docker/Dockerfile.sedona
    image: geojoin-spark:4.0.1-sedona1.8.0
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    command: ["/bin/bash","-lc","/opt/spark/sbin/start-master.sh && tail -f /dev/null"]
    volumes:
      - ./:/workspace
      - "${HOME}/OneDrive/Documents/geojoin/data:/workspace/data"

  spark-worker:
    image: geojoin-spark:4.0.1-sedona1.8.0
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on: [spark-master]
    command: ["/bin/bash","-lc","/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"]
    volumes:
      - ./:/workspace
      - "${HOME}/OneDrive/Documents/geojoin/data:/workspace/data"

  duckdb:
    build:
      context: ./docker
      dockerfile: Dockerfile.duckdb   # pre-installs extensions
    tty: true                         # keep CLI interactive
    stdin_open: true
    volumes:
      - duckdb-data:/data             # dedicated volume for database file
    working_dir: /data
    # default starts interactive CLI; override with: docker compose run duckdb -c ".read scripts/duckdb.sql"
    profiles: ["dev"]

volumes:
  duckdb-data: